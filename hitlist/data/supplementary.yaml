# Supplementary peptide data not in IEDB/CEDAR.
#
# Each entry specifies a PMID (linking to pmid_overrides.yaml curation)
# and a CSV file in the supplementary/ directory.  The 'defaults' dict
# supplies IEDB-equivalent column values for source classification.
#
# Required CSV columns: peptide, mhc_class
# Optional CSV columns: mhc_restriction (per-peptide allele assignment),
#     is_potential_contaminant (bool, MS-observed but no binding prediction)
#
# When mhc_restriction is absent, the alleles from ms_samples are used
# during the observations join (but individual peptide→allele assignment
# is unknown).

# ── Gomez-Zepeda 2024 (PMID 38480730) ─────────────────────────────────
# Thunder-DDA-PASEF on timsTOF Pro-2.  Per-peptide allele assignments
# from NetMHCpan 4.1 (SB or WB binders).  Peptides without a predicted
# binder allele are flagged is_potential_contaminant=True.
#
# Source: Nature Comms Supplementary Data S4-S7,
#         jPOSTrepo JPST002044 / PXD040385

- pmid: 38480730
  file: gomez_zepeda_2024_jy.csv
  study_label: "Gomez-Zepeda 2024 — JY HLA-I peptides"
  source: "Nature Comms S5+S6 (deep profiling) + S3+S4 (method comparison)"
  note: >
    20,983 unique 8-15aa HLA-I peptides from JY EBV-LCL, merged across
    deep-profiling (S5, 3 bio-reps × WT/S1-spike/S2-spike) and method-
    comparison (S3, Thunder-DDA-PASEF 300ms) experiments.  15,110 have
    NetMHCpan allele assignments; 5,873 are potential contaminants.
    JY alleles: A*02:01, B*07:02, C*07:02.
  defaults:
    host: "Homo sapiens (human)"
    culture_condition: "Cell Line / Clone (EBV transformed, B-LCL)"
    cell_name: "JY"
    source_tissue: "Blood"
    process_type: "No immunization"
    disease: "healthy"

