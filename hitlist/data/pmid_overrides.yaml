# Per-PMID study-level curation overrides for IEDB/CEDAR MHC ligand data.
#
# Three levels of specificity:
#   1. PMID-level default (override) — applies to all rows from this study
#   2. Conditional rules (rules) — checked in order, first match wins.
#      Each rule has a "condition" dict of IEDB field → value(s) to match,
#      plus an "override" to apply when matched.
#   3. No match — falls through to structured-field classification
#
# Override values:
#   healthy          - confirmed healthy tissue
#   cancer_patient   - reclassify as cancer-derived
#   adjacent         - reclassify as tumor-adjacent normal tissue
#   activated_apc    - reclassify as activated APC artifact
#   cell_line        - reclassify as cell line (EBV-LCLs within are NOT cancer)
#   ebv_lcl          - EBV-transformed B-LCL (not cancer, not healthy)
#   null             - no override, use default classification logic
#
# Condition fields match against IEDB columns (case-insensitive for
# Source Tissue). Values can be a single string or a list of strings (any match).
#
# Studies without PMIDs: use submission_id instead of pmid as the key.
# The curation code checks both.
#
# Optional metadata fields (informational, not used by classification logic):
#   hla_alleles      - HLA alleles profiled in the study
#   perturbations    - non-standard antigen processing conditions
#                      (gene KO, siRNA, cytokines, infection, etc.)
#   ms_samples       - per-sample-type enumeration of what was profiled
#                      by mass spectrometry and under what conditions
#   mhc_class on ms_samples: "I", "II", or "I+II" for easy filtering
#
# MS acquisition metadata (two-level inheritance):
#   These fields may appear at the PMID level (study-wide default) or on
#   individual ms_samples entries.  Per-sample values override PMID-level.
#   ip_antibody      - immunoprecipitation antibody (W6/32, L243, etc.)
#   acquisition_mode - DDA, DIA, PRM, SRM/MRM
#   instrument       - mass spectrometer (Q Exactive HF, Orbitrap Fusion, etc.)
#   fragmentation    - HCD, CID, ETD, EThcD
#   labeling         - label-free, TMT, SILAC, SIL/hipMHC
#   search_engine    - MaxQuant, PEAKS, Proteome Discoverer, Mascot, etc.
#   fdr              - false discovery rate (e.g. "1%")

# ── Gold-standard healthy tissue ────────────────────────────────────────────

- pmid: 33858848
  label: Marcu 2021 — HLA Ligand Atlas
  title: "HLA Ligand Atlas: a benign reference of HLA-presented peptides to improve T-cell-based cancer\
    \ immunotherapy"
  override: healthy
  note: >
    21 subjects (14 autopsy + 5 living thymus + 2 living ovary), 227 samples across 29 tissues (abstract
    says 227, Results section says 225 — likely 2 excluded after QC). Gold standard benign reference. None
    of the subjects was diagnosed with any malignant disease. Paired HLA-I (198 samples) and HLA-II (220
    samples).
  donors: 21
  tissues: 29
  samples: 227
  hla_alleles:
    class_i: "51 HLA-I allotypes (95% HLA-A, 74% HLA-B, 93% HLA-C population coverage)"
    class_ii: 86 HLA-II allotypes
  ms_samples:
  - type: autopsy tissue
    n: 14
    source: "14 subjects, snap-frozen within 72h post-mortem"
    tissues: "29 tissue types (brain, heart, liver, kidney, lung, spleen, etc.)"
    condition: unperturbed
    mhc_class: I+II
    mhc: unknown
  - type: living donor thymus
    n: 5
    source: surgical thymus from living donors
    condition: unperturbed
    mhc_class: I+II
    mhc: unknown
  - type: living donor ovary
    n: 2
