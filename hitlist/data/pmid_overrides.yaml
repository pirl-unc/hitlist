    P1: ["HLA-A*03:01", "HLA-A*26:01", "HLA-B*07:02"]
    P2: ["HLA-A*02:01", "HLA-B*15:01", "HLA-B*44:27", "HLA-DRB1*04:01"]
    P3: ["HLA-A*02:01", "HLA-A*03:01", "HLA-B*15:01", "HLA-B*18:01"]
  ms_samples:
    - type: "lung tissue (influenza-infected)"
      n: 3
      source: "surgical resection, macroscopically normal, distant from margin"
      condition: "influenza A/H3N2 infection 22h ex vivo"
    - type: "lung tissue (uninfected)"
      n: 0
      condition: "NOT profiled by MS — mock controls for infection rate only"
    - type: "THP-1 macrophages (infected)"
      source: "PMA-differentiated THP-1"
      condition: "PMA differentiation → influenza infection"
    - type: "moDCs (cross-presentation)"
