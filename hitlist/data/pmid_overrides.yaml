    override: healthy
    note: >
      21 subjects (14 autopsy + 5 living thymus + 2 living ovary), 227 samples across 29 tissues (abstract
      says 227, Results section says 225 — likely 2 excluded after QC). Gold standard benign reference. None
      of the subjects was diagnosed with any malignant disease. Paired HLA-I (198 samples) and HLA-II (220
      samples). Per-donor HLA from hla-ligand-atlas.org/rel/2020.12/donors.tsv.gz. Class II mhc entries
      include only DRB alleles (not DP/DQ) to match the DRB-only resolution in the IEDB mhc_restriction
      column for this PMID.
