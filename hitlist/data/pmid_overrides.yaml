    donor_3: ["HLA-A*02:01", "HLA-A*29:02", "HLA-B*44:03", "HLA-B*58:01", "HLA-C*03:02", "HLA-C*16:01"]
  ms_samples:
    - type: "healthy donor serum"
      n: 3
      source: "9 mL whole blood, healthy volunteers"
      condition: "unperturbed — sHLA immunoaffinity purification"
    - type: "healthy donor plasma"
      n: 3
      source: "same 3 donors, EDTA plasma"
      condition: "unperturbed — sHLA immunoaffinity purification"
    - type: "THP-1 cell line"
      n: 1
      source: "acute monocytic leukemia line"
      condition: "unperturbed — comparison only"
    - type: "HEK293 cell line"
      n: 1
