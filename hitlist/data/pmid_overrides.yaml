  - pmid: 29557506
    study_label: Neidert 2018 — Tübingen/Zurich biobank
    title: "The natural HLA ligandome of glioblastoma stem-like cells: antigen discovery for T cell-based immunotherapy"
    override: healthy
    note: >
      The GBM paper itself used 9 GBM tumors + 3 GSC lines (GS-2, GS-5, GS-9), but the IEDB deposit under
      this PMID includes the Tübingen group's benign tissue reference dataset (~160 class I samples from
      patients and autopsy material). Sample IDs in Antigen Processing Comments (e.g. 'buffy coat 23', 'colon
      32'). Per-donor analysis shows single-CTA-per-sample pattern ruling out occult cancer.
    donors: ~160
    samples: 160
    ms_samples:
      - sample_label: blood (buffy coat)
        source: Dept of Transfusion Medicine — healthy blood bank donors
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: healthy
      - sample_label: bone marrow
        source: hip arthroplasty — elderly non-cancer patients
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: healthy
      - sample_label: brain / cerebellum
        source: autopsy (Zurich)
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: healthy
      - sample_label: colon / stomach / liver / pancreas
        source: Visceral & Transplant Surgery
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: adjacent
        reason: surgical departments where cancer resection is routine
      - sample_label: kidney
        source: Urology
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: adjacent
        reason: likely nephrectomy (RCC) adjacent
      - sample_label: lung / breast
        source: surgical departments
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: adjacent
      - sample_label: spleen / ovary / testis
        source: mixed surgical
        condition: unperturbed
        mhc_class: I
        mhc: "HLA class I"
        classification: healthy
    rules:
      - condition:
          Source Tissue:
            - Blood
            - Bone Marrow
            - Central nervous system (CNS)
            - Cerebellum
        override: healthy
        reason: Blood bank donors and autopsy CNS material
      - condition:
          Source Tissue:
            - Gastrointestinal Tract
            - Colon
            - Kidney
            - Liver
            - Lung
            - Stomach
            - Breast
            - Pancreas
        override: adjacent
        reason: Visceral Surgery / Urology departments — likely cancer resection margins
