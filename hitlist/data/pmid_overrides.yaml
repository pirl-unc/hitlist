    Lung from 3 surgery patients ('clinical reasons') — almost certainly
    cancer resection. Tissue taken distant from resection margin, no
    visible abnormalities. ALL MS lung samples were influenza-infected —
    no uninfected control lung tissue was profiled by MS (mock-infected
    controls used only for infection rate comparison).
