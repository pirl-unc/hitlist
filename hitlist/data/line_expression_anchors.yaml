    notes: "HLA class I null EBV-transformed B-LCL. Parent for .221-HLA-* transfectant series and .221 ERAP1 KO."

  - name: "721.221-HLA"
    aliases: ["721.221-hla", "721.221 hla", ".221-hla", ".221 hla", "hla-a*11:01-221", "hla-b*51:01-221"]
    parent_line: "721.221"
    line_family: mono_allelic_host
    lineage_tissue: "blood, b lymphocyte"
    cancer_type: null
    expression_backend: none
    source_ids: []
    notes: "721.221 single-allele transfectants (e.g. 721.221-HLA-A*11:01, 721.221-B*51:01 ERAP1 KO). Resolves to 721.221 via tier 2."

  - name: "T2"
    aliases: ["174xcem.t2", "t2 cell", "t2.dr1", "t2 (174xcem)"]
    parent_line: null
    line_family: mono_allelic_host
    lineage_tissue: "blood, b lymphocyte"
    cancer_type: null
    expression_backend: none
    source_ids: []
    notes: "TAP-deficient 174xCEM.T2; retains HLA-A*02:01. No public RNA-seq packaged — resolves via K562 tier-3 mono-allelic-host class anchor."

