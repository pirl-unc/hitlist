# Curated per-line expression anchors for ms_samples resolution.
#
# Used by hitlist.line_expression.resolve_sample_expression_anchor() to map a
# free-text `sample_label` (and optional `cell_name`, `pmid`, `study_label`)
# onto a stable expression backend + key so downstream training exports can
# attach per-sample RNA evidence while preserving full provenance.
#
# Fallback hierarchy (applied top-down by the resolver):
#   1. exact line RNA / transcript quant          → this file, expression_backend != "none"
#   2. parent-line or engineered-derivative RNA   → this file, follow `parent_line`
#   3. line-family stand-in                       → `line_family` → class anchor:
#        ebv_lcl          → GM12878 (ENCODE)
#        mono_allelic_host → K562 (DepMap) as generic null-host proxy
#   4. cancer-type surrogate (pirlygenes)         → caller-supplied backend; uses `cancer_type`
#   5. broad tissue / lineage surrogate           → `lineage_tissue` → HPA bucket
#   6. no_expression_anchor                        → resolver emits tier 6
#
# Provenance columns written on every downstream export row:
#   expression_backend, expression_key, expression_match_tier, expression_parent_key
#
# Field reference
# ---------------
#   name              canonical line name (stable, display-worthy)
#   aliases           lowercase substrings matched against sample_label / cell_name;
#                     order matters — longer, more-specific aliases first
#   parent_line       canonical name of the parent line (null for roots);
#                     used for tier-2 resolution of engineered derivatives
#   line_family       ebv_lcl | mono_allelic_host | tumor_line |
#                     normal_immortalized | null
#   lineage_tissue    HPA-compatible tissue bucket used by tier-5 fallback
#   cancer_type       free-text surrogate label for tier-4 (pirlygenes) fallback;
#                     null for non-tumor lines
#   expression_backend  depmap_rna | packaged_rnaseq | encode_rnaseq | none
#                       `none` means no exact-line data is available — resolver
#                       drops straight to tier 2/3/etc.
#   expression_key    key joined against line_expression.parquet `line_key`
#                     column. Omitted when expression_backend == "none".
#   source_ids        list of source_id values from
#                     hitlist/data/line_expression/sources.yaml that contribute
#                     rows for this line (used for provenance, not resolution)
#   notes             free-text, human-readable

lines:
  # ── Tumor / cancer cell lines with DepMap coverage ──────────────────────────
  - name: "HeLa"
    aliases: ["hela-s3", "hela s3", "hela"]
    parent_line: null
    line_family: tumor_line
    lineage_tissue: "cervix, uterine"
    cancer_type: "cervical adenocarcinoma"
    expression_backend: depmap_rna
    expression_key: "HeLa"
    source_ids: ["DepMap_24Q4_gene", "DepMap_24Q4_transcript"]
    notes: "Cervical adenocarcinoma (HPV18+). Parent for HeLa.ABC-KO and CIITA derivatives."

  - name: "HeLa.ABC-KO"
    aliases: ["hela.abc-ko", "hela abc-ko", "hela-abc-ko", "hela.abc ko"]
    parent_line: "HeLa"
    line_family: tumor_line
    lineage_tissue: "cervix, uterine"
    cancer_type: "cervical adenocarcinoma"
    expression_backend: none
    source_ids: []
    notes: "HLA-A/B/C triple-KO HeLa used as a null background for HLA-I transfection. No exact-line RNA-seq packaged; resolves via parent HeLa (tier 2)."

  - name: "A375"
    aliases: ["a375"]
    parent_line: null
    line_family: tumor_line
    lineage_tissue: "skin"
    cancer_type: "cutaneous melanoma"
    expression_backend: depmap_rna
    expression_key: "A375"
    source_ids: ["DepMap_24Q4_gene", "DepMap_24Q4_transcript"]
    notes: "BRAF V600E cutaneous melanoma. Common expression / inhibitor context."

  - name: "SaOS-2"
    aliases: ["saos-2", "saos2", "saos 2", "raos"]
    parent_line: null
    line_family: tumor_line
    lineage_tissue: "bone"
    cancer_type: "osteosarcoma"
    expression_backend: depmap_rna
    expression_key: "SAOS2"
    source_ids: ["DepMap_24Q4_gene", "DepMap_24Q4_transcript"]
    notes: "Osteosarcoma. `RaOS` (typo in PMID curation) is normalized to SaOS-2 per issue #140."

  - name: "THP-1"
    aliases: ["thp-1", "thp1", "thp 1"]
    parent_line: null
    line_family: tumor_line
    lineage_tissue: "blood, myeloid"
    cancer_type: "acute monocytic leukemia"
    expression_backend: depmap_rna
    expression_key: "THP1"
    source_ids: ["DepMap_24Q4_gene", "DepMap_24Q4_transcript"]
    notes: "Monocytic AML (M5). MLL-rearranged; commonly used for TLR/immune work."

  # ── Mono-allelic hosts ──────────────────────────────────────────────────────
  - name: "K562"
    aliases: ["k562"]
    parent_line: null
