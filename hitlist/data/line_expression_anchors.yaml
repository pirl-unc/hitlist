    notes: "HLA class I null erythroleukemia (BCR-ABL1). Canonical mono-allelic host. Also serves as tier-3 fallback for other mono-allelic hosts without packaged RNA-seq."

  - name: "C1R"
    aliases: ["c1r", "hmy2.cir", "hmy2cir"]
    parent_line: null
    line_family: mono_allelic_host
    lineage_tissue: "blood, b lymphocyte"
    cancer_type: null
    expression_backend: packaged_rnaseq
    expression_key: "C1R"
    source_ids: ["Kaabinejadian_2022_HLA_mono"]
    notes: "HLA-A/B low Hmy2.CIR B-lymphoblastoid host; retains weak HLA-B*35:03 / HLA-C*04:01. Parent for C1R-HLA-* transfectant series."

  - name: "C1R-HLA"
    aliases: ["c1r-hla", "c1r hla", "c1r.hla"]
    parent_line: "C1R"
    line_family: mono_allelic_host
    lineage_tissue: "blood, b lymphocyte"
    cancer_type: null
    expression_backend: none
    source_ids: []
    notes: "Catch-all for C1R single-allele transfectants (C1R-HLA-B*27:02, C1R-HLA-C*07:02, C1R HLA-E, etc.). Resolves to parent C1R expression (tier 2)."

  - name: "721.221"
